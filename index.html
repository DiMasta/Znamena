  <meta charset="UTF-8">

  <title>Игра с знамена</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #ffffff;
      color: #111111;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      overflow: hidden;
    }

    #game {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    /* Country name is anchored to a fixed area so it never shifts. */
    #name {
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(24px, 5vw, 56px);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1.1;
      max-width: 90vw;
    }

    /* Fixed box so all flags render at an identical size. */
    #flag-box {
      width: 480px;
      height: 320px;
      max-width: 85vw;
      max-height: 55vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
    }

    #flag {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      border: 1px solid #000000;
      -webkit-user-drag: none;
    }
  </style>
</head>

  <div id="game">
    <div id="name">&nbsp;</div>
    <div id="flag-box">

  </div>

    var nameEl = document.getElementById("name");
    var flagEl = document.getElementById("flag");
    var lastIndex = -1;

    function showRandom() {
      var index;
      // Avoid showing the same flag twice in a row.
      do {
        index = Math.floor(Math.random() * countries.length);
      } while (index === lastIndex && countries.length > 1);
      lastIndex = index;

      var country = countries[index];
      nameEl.textContent = country.name;
      // High resolution flag, scaled into a fixed box for identical sizes.
      flagEl.src = "https://flagcdn.com/w640/" + country.code + ".png";
      flagEl.alt = "Знаме на " + country.name;
      // Nepal's flag is not rectangular, so a rectangular border looks wrong.
      flagEl.style.border = country.code === "np" ? "none" : "1px solid #000000";
    }

    document.body.addEventListener("click", showRandom);
